stages:
  - build
  - release

variables:
  NODE_VERSION: "18"

# Build job
build:
  stage: build
  image: node:${NODE_VERSION}
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour
  only:
    - main

# Release job - creates a GitLab release
create_release:
  stage: release
  image: node:${NODE_VERSION}
  before_script:
    - apt-get update -qq && apt-get install -y -qq git curl jq
  script:
    - |
      # Get version from package.json
      VERSION=$(node -p "require('./package.json').version")
      
      # Get the latest commit message for release notes
      RELEASE_NOTES=$(git log -1 --pretty=%B)
      
      # Escape JSON special characters in release notes
      RELEASE_NOTES=$(echo "$RELEASE_NOTES" | jq -Rs .)
      
      # Create GitLab release using API
      # Note: Requires GITLAB_TOKEN CI/CD variable with api scope
      curl --request POST \
        --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "{
          \"name\": \"v${VERSION}\",
          \"tag_name\": \"v${VERSION}\",
          \"description\": ${RELEASE_NOTES},
          \"ref\": \"${CI_COMMIT_SHA}\"
        }" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases"
      
      echo "Release v${VERSION} created successfully"
  dependencies:
    - build
  only:
    - main
  when: on_success
